<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Fondo circular -->
  <circle cx="24" cy="24" r="23" fill="#e6d1d7"/>
  
  <!-- Sombrero de mago - Cuerpo cónico -->
  <path d="M24 4 L35 34 L13 34 Z" fill="#35b2b6"/>
  
  <!-- Pliegue decorativo del sombrero -->
  <path d="M19.5 24 Q24 20 28.5 24" fill="none" stroke="#2a9598" stroke-width="0.8"/>
  
  <!-- Estrellas estampadas en el sombrero -->
  <!-- Estrella 1 (arriba) -->
  <polygon points="24,10 25.2,13 28,13 25.8,15 26.6,18 24,16.2 21.4,18 22.2,15 20,13 22.8,13" fill="#e2e868"/>
  <!-- Estrella 2 (medio-izquierda) -->
  <polygon points="19,20 19.8,22 22,22 20.2,23.4 20.8,25.4 19,24 17.2,25.4 17.8,23.4 16,22 18.2,22" fill="#e2e868"/>
  <!-- Estrella 3 (medio-derecha) -->
  <polygon points="29,22 29.8,24 32,24 30.2,25.4 30.8,27.4 29,26 27.2,27.4 27.8,25.4 26,24 28.2,24" fill="#e2e868"/>
  <!-- Estrella 4 (abajo-centro) -->
  <polygon points="24,27 24.6,28.6 26.4,28.6 25,29.6 25.4,31.2 24,30.2 22.6,31.2 23,29.6 21.6,28.6 23.4,28.6" fill="#e2e868"/>
  
  <!-- Ala del sombrero -->
  <ellipse cx="24" cy="34" rx="16" ry="4" fill="#35b2b6"/>
  <ellipse cx="24" cy="34" rx="16" ry="4" fill="none" stroke="#2a9598" stroke-width="0.8"/>
  
  <!-- Cinta/banda del sombrero -->
  <rect x="13" y="32" width="22" height="3" rx="1" fill="#2a9598"/>
  
  <!-- Brillo sutil en el sombrero -->
  <path d="M22 8 L24 4 L25 10" fill="#4dcacd" opacity="0.4"/>
  
  <!-- Estrella en la punta -->
  <polygon points="24,3 24.8,5.5 27,5.5 25.2,7 25.8,9.5 24,8 22.2,9.5 22.8,7 21,5.5 23.2,5.5" fill="#e2e868" opacity="0.9"/>
</svg>